<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    h1 {
      background: #4f46e5;
      color: white;
      padding: 15px;
      text-align: center;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    #messages div {
      background: white;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }

    #chat-form {
      display: flex;
      padding: 15px;
      background: white;
      border-top: 1px solid #ddd;
    }

    #chat-form input {
      flex: 1;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
    }

    #chat-form button {
      margin-left: 10px;
      padding: 12px 20px;
      border: none;
      background: #4f46e5;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    #chat-form button:hover {
      background: #4338ca;
    }

    #location-button {
      margin: 15px;
      padding: 12px;
      border: none;
      background: #10b981;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    #location-button:hover {
      background: #059669;
    }

    .message {
      background: white;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 10px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }

    .location-box {
      background: #dcfce7;
      border-left: 5px solid #10b981;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .location-box a {
      color: #065f46;
      text-decoration: none;
      font-weight: bold;
    }

    .location-box a:hover {
      text-decoration: underline;
    }
    .user-info {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #4f46e5;
      color: black;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      flex-shrink: 0;
    }

    .user-info h4 {
      margin-bottom: 4px;
      color: #4f46e5;
    }
  </style>
  <body>
    <h1>Chat App</h1>

    <div id="messages"></div>

    <form id="chat-form">
      <input type="text" name="message" placeholder="Type a message..." />
      <button>Send</button>
    </form>

    <button id="location-button">send location</button>

    <script id="message-template" type="text/html">
      <div class="message">
        <div class="user-info">
          <div class="avatar">{{username}}</div>

          <div>
            <h4>{{username}}</h4>
            <p>{{message}}</p>
          </div>
        </div>
      </div>
    </script>

    <script id="location-template" type="text/html">
      <div class="location-box">
        <a href="{{url}}" target="_blank"> 📍 Open Shared Location </a>
      </div>
    </script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mustache.js/3.0.1/mustache.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.22.2/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qs/6.6.0/qs.min.js"></script>

    <script src="/chat.js"></script>
  </body>
</html>
